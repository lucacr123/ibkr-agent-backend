[phases.setup]
nixPkgs = ["nodejs_18", "python312", "gcc-unwrapped", "zlib"]

[phases.install]
cmds = [
  "npm ci",
  "python3 -m venv /app/pyenv",
  "GCC_LIB=$(find /nix/store -name 'libstdc++.so.6' -maxdepth 6 2>/dev/null | head -1 | xargs dirname) && ZLIB=$(find /nix/store -name 'libz.so.1' -maxdepth 6 2>/dev/null | head -1 | xargs dirname) && LD_LIBRARY_PATH=$GCC_LIB:$ZLIB /app/pyenv/bin/pip install --quiet 'numpy<2' pandas matplotlib scipy yfinance && echo $GCC_LIB:$ZLIB > /app/lib_path.txt"
]

[start]
cmd = "node server.js"
