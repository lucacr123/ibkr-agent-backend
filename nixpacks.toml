[phases.setup]
nixPkgs = [
  "nodejs_18",
  "python312",
  "python312Packages.numpy",
  "python312Packages.pandas",
  "python312Packages.matplotlib",
  "python312Packages.scipy"
]

[phases.install]
cmds = [
  "npm ci",
  "python3 -m ensurepip --upgrade",
  "python3 -m pip install --quiet yfinance"
]

[start]
cmd = "node server.js"
