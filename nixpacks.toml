[phases.setup]
nixPkgs = [
  "nodejs_18",
  "python312",
  "python312Packages.numpy",
  "python312Packages.pandas",
  "python312Packages.matplotlib",
  "python312Packages.scipy",
  "python312Packages.virtualenv"
]

[phases.install]
cmds = [
  "npm ci",
  "virtualenv --system-site-packages /app/pyenv",
  "/app/pyenv/bin/pip install --quiet yfinance"
]

[start]
cmd = "node server.js"
